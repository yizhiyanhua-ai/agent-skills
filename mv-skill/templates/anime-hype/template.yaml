# 热血动漫风格模板
# 参考：《圣斗士星矢》《火影忍者》《鬼灭之刃》OP

name: "anime-hype"
description: "热血动漫风格，适合战斗、励志、运动主题"
display_name: "热血动漫"

# 视觉风格定义
visual_style:
  color_palette:
    primary: "#FF4500"       # 热血橙红
    secondary: "#FFD700"     # 金色光芒
    accent: "#1E90FF"        # 能量蓝
    background: "#0D0D0D"    # 深黑底
    text: "#FFFFFF"          # 纯白文字

  # AI 图像生成的风格后缀
  ai_prompt_suffix: "anime style, dynamic lighting, vibrant colors, cel-shaded, dramatic shadows, high contrast"

  # 素材库搜索关键词
  stock_keywords:
    - "anime"
    - "particles"
    - "energy"
    - "explosion"
    - "light rays"
    - "fire"
    - "abstract motion"

  # 字体配置
  fonts:
    title: "Noto Sans SC"
    subtitle: "Bebas Neue"
    lyrics: "Noto Sans SC"

  # 文字效果
  text_effects:
    title:
      stroke: true
      stroke_color: "#000000"
      stroke_width: 3
      shadow: true
      shadow_blur: 10
    lyrics:
      stroke: true
      stroke_color: "#000000"
      stroke_width: 2

# 节奏配置
rhythm:
  bpm_range:
    min: 120
    max: 160
    ideal: 140

  scene_duration:
    min: 2        # 最短镜头（秒）
    max: 8        # 最长镜头（秒）
    avg: 4        # 平均镜头长度

  # 节拍同步比例（多少比例的镜头切换对齐节拍）
  beat_sync_ratio: 0.7

  # 音乐生成提示词模板
  music_prompt_template: "epic anime battle theme, orchestral, {mood}, intense drums, heroic melody, {bpm}bpm, japanese style"

# 动画配置
animations:
  # 偏好的动画效果（按优先级排序）
  preferred:
    - "zoom-in"
    - "shake"
    - "flash"
    - "speed-lines"
    - "pan-left"
    - "pan-right"

  # 动画强度
  intensity: "high"

  # 各动画的默认参数
  params:
    zoom-in:
      scale_from: 1.0
      scale_to: 1.3
      duration_ratio: 1.0
    zoom-out:
      scale_from: 1.3
      scale_to: 1.0
      duration_ratio: 1.0
    shake:
      intensity: 10
      frequency: 15
    speed-lines:
      count: 20
      speed: 2000
      color: "#FFFFFF"
    ken-burns:
      scale_from: 1.0
      scale_to: 1.15
      pan_x: 50
      pan_y: 0

# 转场配置
transitions:
  # 偏好的转场效果
  preferred:
    - "flash"
    - "wipe-diagonal"
    - "impact-frame"
    - "cross-fade"

  # 默认转场时长（秒）
  duration: 0.3

  # 各转场的默认参数
  params:
    flash:
      color: "#FFFFFF"
      hold_frames: 2
    impact-frame:
      colors: ["#FF4500", "#FFD700", "#FFFFFF"]
      frame_count: 3
    wipe-diagonal:
      angle: 45
      color: "#000000"

# MV 结构模板
structure:
  total_duration: 55

  sections:
    - type: "intro"
      duration: 3
      description: "标题展示，宇宙/能量背景"
      scene_type: "title"
      animation: "zoom-in"
      transition: "flash"

    - type: "intro_action"
      duration: 4
      description: "开场动作镜头"
      scene_count: 2
      scene_type: "action"
      animations: ["zoom-in", "pan-right"]
      transitions: ["flash", "cross-fade"]
      beat_sync: true

    - type: "buildup"
      duration: 12
      description: "角色/场景快速切换，能量积蓄"
      scene_count: 6
      scene_type: "action"
      animations: ["shake", "zoom-in", "pan-left", "zoom-out", "pan-right", "shake"]
      transitions: ["cross-fade", "flash", "wipe-diagonal", "flash", "cross-fade", "impact-frame"]
      beat_sync: true

    - type: "pre_climax"
      duration: 5
      description: "高潮前的蓄力"
      scene_count: 3
      scene_type: "action"
      animations: ["zoom-in", "shake", "speed-lines"]
      transitions: ["flash", "impact-frame", "flash"]
      beat_sync: true

    - type: "climax"
      duration: 15
      description: "高潮段落，密集剪辑，特效叠加"
      scene_count: 8
      scene_type: "action"
      animations: ["shake", "speed-lines", "flash", "zoom-in", "shake", "pan-left", "speed-lines", "flash"]
      transitions: ["flash", "impact-frame", "flash", "wipe-diagonal", "impact-frame", "flash", "cross-fade", "flash"]
      beat_sync: true

    - type: "bridge"
      duration: 8
      description: "情感段落，节奏稍缓"
      scene_count: 4
      scene_type: "action"
      animations: ["ken-burns", "zoom-out", "pan-right", "ken-burns"]
      transitions: ["fade", "cross-fade", "fade", "cross-fade"]
      beat_sync: false

    - type: "final_burst"
      duration: 5
      description: "最后爆发"
      scene_count: 3
      scene_type: "action"
      animations: ["shake", "speed-lines", "flash"]
      transitions: ["impact-frame", "flash", "flash"]
      beat_sync: true

    - type: "finale"
      duration: 3
      description: "终结 pose，标题再现"
      scene_type: "title"
      animation: "zoom-out"
      transition: "fade"

# 场景生成提示词模板
scene_prompts:
  intro:
    - "cosmic explosion, galaxy forming, golden light rays, epic scale"
    - "universe birth, stars and nebula, dramatic lighting"
    - "energy vortex, swirling cosmos, bright center"

  hero:
    - "anime warrior in armor, heroic pose, dramatic lighting"
    - "protagonist standing tall, wind flowing, determined expression"
    - "hero silhouette, glowing aura, power emanating"

  power_up:
    - "energy aura gathering, golden particles, power charging"
    - "glowing transformation, light burst, ascending power"
    - "cosmic energy flowing into warrior, bright emanation"

  battle:
    - "epic anime battle, two forces clashing, energy waves"
    - "dynamic fight scene, motion blur, impact moment"
    - "warriors in combat, dramatic poses, explosive background"

  emotional:
    - "hero looking at stars, peaceful moment, hopeful"
    - "quiet determination, sunset/sunrise backdrop"
    - "memories flashback, soft lighting, emotional"

  victory:
    - "triumphant pose, golden light, victory achieved"
    - "hero standing victorious, dramatic sky"
    - "sunrise behind hero silhouette, new beginning"
